<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f9fa;
    --panel: rgba(255,255,255,0.92);
    --text: #212529;
    --muted: #667085;
    --line: #d9e2ec;
    --accent: #0f4c81;
    --accent-soft: #edf5fc;
    --danger-soft: #fff1f1;
    --shadow: 0 18px 42px rgba(15, 23, 42, 0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background:
      radial-gradient(circle at top left, rgba(15, 76, 129, 0.12), transparent 26%),
      linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    font-family: 'Public Sans', sans-serif;
    color: var(--text);
  }
  .login-box {
    width: 100%;
    max-width: 360px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }
  .login-head {
    padding: 16px 18px 14px;
    background: linear-gradient(180deg, #ffffff 0%, #f7fafc 100%);
    border-bottom: 1px solid var(--line);
  }
  .login-head h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 18px;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }
  .login-head p {
    margin-top: 5px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }
  .login-body { padding: 16px 18px 18px; }
  label {
    display: block;
    margin-bottom: 5px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  input {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(15, 76, 129, 0.12);
  }
  .btn {
    width: 100%;
    margin-top: 12px;
    padding: 10px 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, #1461a8 100%);
    color: white;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .error {
    margin-bottom: 10px;
    padding: 9px 10px;
    border-radius: 10px;
    background: var(--danger-soft);
    color: #9b1c1c;
    font-size: 11px;
    border: 1px solid #f1d2d2;
  }
  .back-link {
    display: inline-block;
    margin-top: 10px;
    color: var(--accent);
    text-decoration: none;
    font-size: 11px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="login-box">
    <div class="login-head">
      <h1>Admin Panel Login</h1>
      <p>Enter the admin password to manage records, downloads, and assets.</p>
    </div>
    <div class="login-body">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="{{ url_for('admin_login') }}">
        <label for="password">Admin Password</label>
        <input type="password" id="password" name="password" required autofocus>
        <button class="btn" type="submit">Open Admin Panel</button>
      </form>
      <a class="back-link" href="{{ url_for('index') }}">Back to data entry</a>
    </div>
  </div>
</body>
</html>
