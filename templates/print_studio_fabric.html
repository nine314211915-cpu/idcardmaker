<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Studio (Fabric)</title>
  <style>
    :root {
      --bg: #f3efe7;
      --panel: #fffdf9;
      --line: #decebc;
      --text: #2f241c;
      --accent: #8b0000;
      --muted: #7c6e62;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #faf7f2 0%, var(--bg) 100%);
      color: var(--text);
      padding: 8px;
      height: 100vh;
      overflow: hidden;
    }
    .app {
      max-width: 1600px;
      height: calc(100vh - 16px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      min-height: 0;
    }
    .banner {
      border: 1px solid #e2b25f;
      background: #fff1cc;
      color: #5a3a00;
      border-radius: 10px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .top {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 7px;
      display: grid;
      gap: 6px;
    }
    .top-grid {
      display: grid;
      grid-template-columns: 130px 130px 130px 1fr 1fr 120px 120px;
      gap: 6px;
      align-items: end;
    }
    .title { font-size: 24px; font-weight: 800; color: #3a2b20; line-height: 1; }
    .field { display: grid; gap: 4px; }
    .field label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .field select, .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: #fff;
      font-size: 12px;
      color: var(--text);
    }
    .btn-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }
    .btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: #fff;
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.2;
    }
    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }
    .shell {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr) 250px;
      gap: 8px;
      min-height: 0;
      height: 100%;
    }
    .center-stage {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      min-height: 0;
    }
    .card-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      padding: 4px 8px;
    }
    .nav-btn {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      line-height: 1;
      display: grid;
      place-items: center;
      color: #3c2a1f;
    }
    .card-pos {
      min-width: 80px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #6a5a4e;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }
    .panel-head {
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: .8px;
      font-size: 10px;
      color: #68584c;
      font-weight: 800;
      background: #fff;
    }
    .panel-body {
      padding: 7px;
      display: grid;
      gap: 8px;
      overflow: auto;
      min-height: 0;
      align-content: start;
    }
    .group {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 7px;
      display: grid;
      gap: 7px;
    }
    .group h3 { font-size: 12px; color: #4a3629; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .canvas-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.95)),
        repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(139,0,0,.035) 24px, rgba(139,0,0,.035) 25px),
        repeating-linear-gradient(90deg, transparent, transparent 24px, rgba(139,0,0,.035) 24px, rgba(139,0,0,.035) 25px);
      min-height: 0;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 6px;
      overflow: auto;
    }
    #canvasFrame {
      border: 1px solid #cbb8a4;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 18px 30px rgba(59, 34, 20, 0.08);
    }
    .status { font-size: 11px; color: var(--muted); min-height: 14px; }
    .storage-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 11px;
      color: #65574b;
    }
    .storage-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
      background: #c78a00;
    }
    .storage-dot.green { background: #1a7f37; }
    .storage-dot.red { background: #c0392b; }
    .storage-dot.yellow { background: #c78a00; }
    .usage-battery {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
    }
    .usage-battery-shell {
      width: 70px;
      height: 10px;
      border: 1px solid #bca78f;
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      background: #f5ede3;
    }
    .usage-battery-fill {
      height: 100%;
      width: 12%;
      background: #c78a00;
      transition: width .18s ease;
    }
    .usage-battery-label {
      font-size: 10px;
      font-weight: 800;
      color: #5f4e42;
      min-width: 34px;
      text-align: right;
    }
    .layer-list {
      border: 1px solid var(--line);
      border-radius: 8px;
      max-height: 180px;
      overflow: auto;
      background: #fff;
      padding: 4px;
      display: grid;
      gap: 4px;
    }
    .layer-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      font-size: 12px;
      padding: 5px 7px;
      cursor: pointer;
      text-align: left;
    }
    .layer-item.active { border-color: #9b3b2d; background: #fff7f2; }
    .asset-grid { display: grid; gap: 8px; }
    .asset-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
      background: #fff;
      display: grid;
      gap: 6px;
    }
    .asset-title { font-size: 12px; font-weight: 700; color: #5f4d40; }
    .asset-select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 5px 6px;
      font-size: 11px;
      background: #fff;
      color: #3f2f24;
    }
    .asset-preview {
      width: 100%;
      height: 52px;
      border: 1px dashed #d4c4b4;
      border-radius: 7px;
      background: #f9f5ef;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-size: 11px;
      color: #8a7b6e;
    }
    .asset-preview img { width: 100%; height: 100%; object-fit: cover; }
    @media (max-width: 1320px) {
      .top-grid { grid-template-columns: 1fr 1fr; }
      .btn-row { grid-template-columns: 1fr 1fr; }
      .shell { grid-template-columns: 1fr; }
      body { overflow: auto; }
      .app { height: auto; min-height: 0; }
      .canvas-wrap { min-height: 380px; height: auto; }
      .panel-body { overflow: visible; }
    }
  </style>
</head>
<body>
<main class="app">
  <div class="banner">@ Fabric Print Studio Build: {{ build_tag }}</div>
  <section class="top">
    <div class="top-grid">
      <div class="title">Print Studio</div>
      <div class="field">
        <label>Template</label>
        <select id="templateType">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
          <option value="badge">Badge</option>
          <option value="mini">Mini</option>
        </select>
      </div>
      <div class="field">
        <label>Photo Shape</label>
        <select id="photoShape">
          <option value="rectangle">Rectangle</option>
          <option value="rounded">Rounded</option>
          <option value="circle">Circle</option>
        </select>
      </div>
      <div class="field">
        <label>Institute</label>
        <select id="instituteSelect"></select>
      </div>
      <div class="field">
        <label>Batch</label>
        <select id="batchSelect"></select>
      </div>
      <button class="btn primary" id="saveServerBtn" type="button">Save To Server</button>
      <button class="btn" id="loadServerBtn" type="button">Load From Server</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="saveLocalBtn" type="button">Save Local</button>
      <button class="btn primary" id="exportBtn" type="button">Export PNG (Hi-Res)</button>
      <button class="btn" id="batchZipBtn" type="button">Batch ZIP (Hi-Res)</button>
      <button class="btn primary" id="batchPdfBtn" type="button">Batch PDF (A4)</button>
    </div>
    <div class="storage-strip">
      <span class="storage-dot yellow" id="studioStorageDot"></span>
      <span id="studioStorageSummary">Checking storage...</span>
      <span class="usage-battery" id="studioUsageMeta">
        <span class="usage-battery-shell"><span class="usage-battery-fill" id="studioUsageFill"></span></span>
        <span class="usage-battery-label" id="studioUsageLabel">--%</span>
      </span>
    </div>
    <div class="status" id="statusLine">Ready.</div>
  </section>

  <section class="shell">
    <aside class="panel">
      <div class="panel-head">Manual Controls</div>
      <div class="panel-body">
        <article class="group">
          <h3>Background</h3>
          <div class="row2">
            <div class="field">
              <label>Start</label>
              <input id="bgStart" type="color" value="#ffffff">
            </div>
            <div class="field">
              <label>End</label>
              <input id="bgEnd" type="color" value="#f1f5fb">
            </div>
          </div>
          <button class="btn" id="applyBgBtn" type="button">Apply Background</button>
        </article>
        <article class="group">
          <h3>Selected Layer</h3>
          <div class="field">
            <label>Layer</label>
            <select id="layerSelect"></select>
          </div>
          <div class="row2">
            <div class="field"><label>X</label><input id="layerX" type="number" value="0"></div>
            <div class="field"><label>Y</label><input id="layerY" type="number" value="0"></div>
          </div>
          <div class="row2">
            <div class="field"><label>Scale %</label><input id="layerScale" type="number" value="100"></div>
            <div class="field"><label>Rotate</label><input id="layerRotate" type="number" value="0"></div>
          </div>
          <button class="btn" id="applyLayerBtn" type="button">Apply Position</button>
        </article>
      </div>
    </aside>

    <section class="center-stage">
      <div class="card-nav">
        <button class="nav-btn" id="prevCardBtn" type="button" aria-label="Previous Card">&lt;</button>
        <div class="card-pos" id="cardPosition">1/1</div>
        <button class="nav-btn" id="nextCardBtn" type="button" aria-label="Next Card">&gt;</button>
      </div>
      <section class="canvas-wrap">
        <div id="canvasFrame">
          <canvas id="designCanvas"></canvas>
        </div>
      </section>
    </section>

    <aside class="panel">
      <div class="panel-head">Layers</div>
      <div class="panel-body">
        <article class="group">
          <h3>Layer Manager</h3>
          <div class="layer-list" id="layerList"></div>
          <div class="row2">
            <button class="btn" id="bringFrontBtn" type="button">Bring Front</button>
            <button class="btn" id="sendBackBtn" type="button">Send Back</button>
          </div>
          <div class="row2">
            <button class="btn" id="toggleLockBtn" type="button">Lock/Unlock</button>
            <button class="btn" id="toggleHideBtn" type="button">Hide/Show</button>
          </div>
        </article>
        <article class="group">
          <h3>Uploaded Assets</h3>
          <div class="status">Use Upload to add Photo, Logo, Signature and manage them here.</div>
          <div class="asset-grid" id="assetLibrary"></div>
        </article>
      </div>
    </aside>
  </section>
</main>

<input id="bgFileInput" type="file" accept="image/*" hidden>
<input id="photoFileInput" type="file" accept="image/*" hidden>
<input id="logoFileInput" type="file" accept="image/*" hidden>
<input id="signFileInput" type="file" accept="image/*" hidden>

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>
(() => {
  const records = {{ records|tojson }};
  const fallbackRecord = {{ sample_record|tojson }};
  const institute = {{ institute|tojson }};
  const batchId = {{ batch_id|tojson }};
  function normalizeEmployee(row, idx, fallback = false) {
    return {
      key: String(row.serial_no || row.employee_id || row.id || `EMP-${idx + 1}`),
      name: row.name || "Employee",
      designation: row.designation || row.training_year || row.course || "",
      employee_id: row.employee_id || row.serial_no || row.id || `EMP-${idx + 1}`,
      department: row.department || "",
      institute_name: row.display_institute_name || row.institute_name || institute || "Institute Name",
      photo_url: row.photo_url || "",
      __fallback: !!fallback,
    };
  }
  let employees = (Array.isArray(records) && records.length
    ? records.map((row, idx) => normalizeEmployee(row, idx))
    : [normalizeEmployee(fallbackRecord || {}, 0, true)]);

  const templateTypeEl = document.getElementById("templateType");
  const photoShapeEl = document.getElementById("photoShape");
  const instituteSelectEl = document.getElementById("instituteSelect");
  const batchSelectEl = document.getElementById("batchSelect");
  const layerSelectEl = document.getElementById("layerSelect");
  const layerListEl = document.getElementById("layerList");
  const statusLineEl = document.getElementById("statusLine");
  const cardPositionEl = document.getElementById("cardPosition");
  const studioStorageDotEl = document.getElementById("studioStorageDot");
  const studioStorageSummaryEl = document.getElementById("studioStorageSummary");
  const studioUsageMetaEl = document.getElementById("studioUsageMeta");
  const studioUsageFillEl = document.getElementById("studioUsageFill");
  const studioUsageLabelEl = document.getElementById("studioUsageLabel");
  const bgStartEl = document.getElementById("bgStart");
  const bgEndEl = document.getElementById("bgEnd");
  const layerXEl = document.getElementById("layerX");
  const layerYEl = document.getElementById("layerY");
  const layerScaleEl = document.getElementById("layerScale");
  const layerRotateEl = document.getElementById("layerRotate");
  const assetLibraryEl = document.getElementById("assetLibrary");

  const bgInputEl = document.getElementById("bgFileInput");
  const photoInputEl = document.getElementById("photoFileInput");
  const logoInputEl = document.getElementById("logoFileInput");
  const signInputEl = document.getElementById("signFileInput");

  const templates = {
    horizontal: { w: 760, h: 460 },
    vertical: { w: 460, h: 760 },
    badge: { w: 560, h: 560 },
    mini: { w: 600, h: 360 }
  };

  const canvas = new fabric.Canvas("designCanvas", {
    preserveObjectStacking: true,
    selection: true
  });
  let selectedEmployee = employees[0];
  let currentCardIndex = 0;
  let currentInstitute = institute || "";
  let currentBatchId = batchId || "";
  let instituteBatches = {};
  let isBatchExporting = false;
  let assetUrls = {};
  let backgroundLibrary = [];
  let studioStorageStatus = null;
  const assetConfig = {
    background_image: { label: "Background", inputId: "bgFileInput", type: "background" },
    employee_photo: { label: "Photo", inputId: "photoFileInput", type: "photo" },
    logo_image: { label: "Logo", inputId: "logoFileInput", type: "logo" },
    sign_image: { label: "Signature", inputId: "signFileInput", type: "signature" },
  };

  function setStatus(text, error = false) {
    statusLineEl.textContent = text;
    statusLineEl.style.color = error ? "#a1261a" : "#7c6e62";
  }

  function updateCardPosition() {
    if (!cardPositionEl) return;
    const total = Math.max(1, employees.length);
    const current = Math.min(total, Math.max(1, currentCardIndex + 1));
    cardPositionEl.textContent = `Card ${current}/${total}`;
  }

  function renderStudioStorageStatus() {
    if (!studioStorageDotEl || !studioStorageSummaryEl || !studioUsageFillEl || !studioUsageLabelEl || !studioUsageMetaEl) return;
    if (!studioStorageStatus) {
      studioStorageDotEl.className = "storage-dot yellow";
      studioStorageSummaryEl.textContent = "Checking storage...";
      studioUsageFillEl.style.width = "12%";
      studioUsageFillEl.style.background = "#c78a00";
      studioUsageLabelEl.textContent = "--%";
      studioUsageMetaEl.title = "Usage: checking...";
      return;
    }
    if (!studioStorageStatus.enabled) {
      studioStorageDotEl.className = "storage-dot red";
      studioStorageSummaryEl.textContent = studioStorageStatus.bucket_error || "Supabase not configured";
      studioUsageFillEl.style.width = "100%";
      studioUsageFillEl.style.background = "#c0392b";
      studioUsageLabelEl.textContent = "N/A";
      studioUsageMetaEl.title = "Usage: unavailable";
      return;
    }
    const usagePercent = Math.max(0, Math.min(100, Number(studioStorageStatus.usage_percent || 0)));
    const usageSummary = studioStorageStatus.usage_summary || "Usage available";
    if (studioStorageStatus.bucket_ready) {
      studioStorageDotEl.className = "storage-dot green";
      studioStorageSummaryEl.textContent = "Storage connected";
      studioUsageFillEl.style.width = `${usagePercent}%`;
      studioUsageFillEl.style.background = usagePercent >= 85 ? "#c0392b" : (usagePercent >= 60 ? "#c78a00" : "#1a7f37");
      studioUsageLabelEl.textContent = `${usagePercent.toFixed(0)}%`;
      studioUsageMetaEl.title = `Usage: ${usageSummary}`;
      return;
    }
    studioStorageDotEl.className = "storage-dot red";
    studioStorageSummaryEl.textContent = studioStorageStatus.bucket_error || "Storage unavailable";
    studioUsageFillEl.style.width = "100%";
    studioUsageFillEl.style.background = "#c0392b";
    studioUsageLabelEl.textContent = "ERR";
    studioUsageMetaEl.title = "Usage: unavailable";
  }

  async function loadStudioStorageStatus() {
    const activeInstitute = getActiveInstitute();
    try {
      const res = await fetch(`/api/supabase-storage-status?institute=${encodeURIComponent(activeInstitute || "")}`);
      const text = await res.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { enabled: false, bucket_error: "Invalid storage response" };
      }
      if (!res.ok) {
        studioStorageStatus = { enabled: false, bucket_error: data.error || "Unable to load storage status" };
      } else {
        studioStorageStatus = data;
      }
    } catch {
      studioStorageStatus = { enabled: false, bucket_error: "Unable to load storage status" };
    }
    renderStudioStorageStatus();
  }

  function getActiveInstitute() {
    return (instituteSelectEl && instituteSelectEl.value) ? instituteSelectEl.value : currentInstitute;
  }

  function getActiveBatch() {
    return (batchSelectEl && batchSelectEl.value) ? batchSelectEl.value : currentBatchId;
  }

  function setTemplateSize(type) {
    const cfg = templates[type] || templates.horizontal;
    canvas.setWidth(cfg.w);
    canvas.setHeight(cfg.h);
    document.getElementById("canvasFrame").style.width = cfg.w + "px";
    document.getElementById("canvasFrame").style.height = cfg.h + "px";
  }

  function makeGradientRect() {
    const rect = new fabric.Rect({
      left: 0,
      top: 0,
      width: canvas.getWidth(),
      height: canvas.getHeight(),
      selectable: false,
      evented: false,
      customId: "background"
    });
    rect.set("fill", new fabric.Gradient({
      type: "linear",
      gradientUnits: "pixels",
      coords: { x1: 0, y1: 0, x2: canvas.getWidth(), y2: canvas.getHeight() },
      colorStops: [
        { offset: 0, color: bgStartEl.value },
        { offset: 1, color: bgEndEl.value }
      ]
    }));
    return rect;
  }

  function applyPhotoClip(imageObj) {
    const shape = photoShapeEl.value;
    if (!imageObj) return;
    if (shape === "circle") {
      imageObj.clipPath = new fabric.Circle({
        radius: Math.min(imageObj.width * imageObj.scaleX, imageObj.height * imageObj.scaleY) / 2,
        originX: "center",
        originY: "center",
      });
    } else if (shape === "rounded") {
      imageObj.clipPath = new fabric.Rect({
        width: imageObj.width,
        height: imageObj.height,
        rx: 22,
        ry: 22,
        originX: "center",
        originY: "center",
      });
    } else {
      imageObj.clipPath = null;
    }
  }

  function findById(id) {
    return canvas.getObjects().find((obj) => obj.customId === id) || null;
  }

  function getSlotForAssetId(id) {
    if (id === "background_image") {
      return { left: 0, top: 0, width: canvas.getWidth(), height: canvas.getHeight() };
    }
    if (id === "employee_photo") {
      const slot = findById("photo_slot");
      if (slot) return { left: slot.left || 0, top: slot.top || 0, width: slot.width || 150, height: slot.height || 180 };
    }
    if (id === "logo_image") {
      const slot = findById("logo_slot");
      if (slot) return { left: slot.left || 0, top: slot.top || 0, width: slot.width || 120, height: slot.height || 70 };
    }
    if (id === "sign_image") {
      const slot = findById("signature_slot");
      if (slot) return { left: slot.left || 0, top: slot.top || 0, width: slot.width || 150, height: slot.height || 45 };
    }
    return { left: 10, top: 10, width: 120, height: 80 };
  }

  function normalizeBackgroundLibrary() {
    const unique = [];
    const seen = new Set();
    (Array.isArray(backgroundLibrary) ? backgroundLibrary : []).forEach((url) => {
      const value = String(url || "").trim();
      if (!value || seen.has(value)) return;
      seen.add(value);
      unique.push(value);
    });
    backgroundLibrary = unique;
    const activeBg = String(assetUrls.background_image || "").trim();
    if (activeBg && !seen.has(activeBg)) {
      backgroundLibrary.unshift(activeBg);
    }
    if (!assetUrls.background_image && backgroundLibrary.length) {
      assetUrls.background_image = backgroundLibrary[0];
    }
  }

  async function applyBackgroundFromLibrary(url) {
    const value = String(url || "").trim();
    if (!value) {
      const existing = findById("background_image");
      if (existing) canvas.remove(existing);
      delete assetUrls.background_image;
      canvas.requestRenderAll();
      return;
    }
    assetUrls.background_image = value;
    if (!backgroundLibrary.includes(value)) {
      backgroundLibrary.unshift(value);
    }
    const s = getSlotForAssetId("background_image");
    await placeImageFromUrl(value, "background_image", s.left, s.top, s.width, s.height);
  }

  function addText(id, text, left, top, color, size, weight = "normal") {
    const node = new fabric.Text(text, {
      left,
      top,
      fill: color,
      fontSize: size,
      fontWeight: weight,
      fontFamily: "Segoe UI",
      customId: id
    });
    canvas.add(node);
  }

    });

      strokeDashArray: [4, 4],
      customId: "logo_slot"
    });
    canvas.add(logo);

    const sign = new fabric.Rect({
      left: Math.round(w - 185),
      top: Math.round(h - 95),
      width: 150,

    });

    } else if (selectedEmployee.photo_url) {
      await placeImageFromUrl(selectedEmployee.photo_url, "employee_photo", photoSlot.left, photoSlot.top, photoSlot.width, photoSlot.height);
    }
    if (assetUrls.background_image) {
      const s = getSlotForAssetId("background_image");
      await placeImageFromUrl(assetUrls.background_image, "background_image", s.left, s.top, s.width, s.height);
    }
    if (assetUrls.logo_image) {
      const s = getSlotForAssetId("logo_image");
      await placeImageFromUrl(assetUrls.logo_image, "logo_image", s.left, s.top, s.width, s.height);
    }
    if (assetUrls.sign_image) {
      const s = getSlotForAssetId("sign_image");
      await placeImageFromUrl(assetUrls.sign_image, "sign_image", s.left, s.top, s.width, s.height);

    canvas.renderAll();
    refreshLayers();

  function replaceOrAddImage(id, img) {
    const existing = findById(id);
    if (existing) canvas.remove(existing);
    img.customId = id;
    canvas.add(img);
    if (id === "background_image") {
      img.selectable = false;
      img.evented = false;
      img.sendToBack();
      const baseBg = findById("background");
      if (baseBg) baseBg.sendToBack();
    }
    if (img.selectable !== false) {
      canvas.setActiveObject(img);
    } else {
      canvas.discardActiveObject();
    }
    canvas.renderAll();
    refreshLayers();
  }

  function placeImageFromUrl(url, id, left, top, width, height) {
    return new Promise((resolve) => {
      fabric.Image.fromURL(url, (img) => {
        if (!img) {
          resolve(null);
          return;
        }
        const isBackground = id === "background_image";
        const scale = isBackground
          ? Math.max(width / img.width, height / img.height)
          : Math.min(width / img.width, height / img.height);
        img.set({
          left: isBackground ? 0 : left,
          top: isBackground ? 0 : top,
          scaleX: scale,
          scaleY: scale,
          customId: id,
        });
        if (isBackground) {
          img.clipPath = new fabric.Rect({
            left: 0,
            top: 0,
            width,
            height,
            absolutePositioned: true,
          });
        }
        if (id === "employee_photo") {
          applyPhotoClip(img);
        }
        replaceOrAddImage(id, img);
        resolve(img);
      }, { crossOrigin: "anonymous" });
    });
  }

  function refreshLayers() {
    const layers = canvas.getObjects().filter((o) => o.customId !== "background");
    layerSelectEl.innerHTML = layers.map((obj) => `<option value="${obj.customId || obj.type}">${obj.customId || obj.type}</option>`).join("");
    const active = canvas.getActiveObject();
    if (active && active.customId) {
      layerSelectEl.value = active.customId;
    }
    layerListEl.innerHTML = layers.slice().reverse().map((obj) => {
      const id = obj.customId || obj.type;
      const activeClass = active === obj ? " active" : "";
      return `<button class="layer-item${activeClass}" data-layer="${id}" type="button">${id}</button>`;
    }).join("");
    layerListEl.querySelectorAll("[data-layer]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-layer");
        const obj = findById(id);
        if (!obj) return;
        canvas.setActiveObject(obj);
        canvas.requestRenderAll();
        syncSelectedControls();
        refreshLayers();
      });
    });
  }

  function syncSelectedControls() {
    const obj = canvas.getActiveObject();
    if (!obj) return;
    layerXEl.value = Math.round(obj.left || 0);
    layerYEl.value = Math.round(obj.top || 0);
    layerScaleEl.value = Math.round((obj.scaleX || 1) * 100);
    layerRotateEl.value = Math.round(obj.angle || 0);
  }

  function applySelectedControls() {
    const obj = canvas.getActiveObject() || findById(layerSelectEl.value);
    if (!obj) return;
    obj.set({
      left: Number(layerXEl.value || 0),
      top: Number(layerYEl.value || 0),
      scaleX: Number(layerScaleEl.value || 100) / 100,
      scaleY: Number(layerScaleEl.value || 100) / 100,
      angle: Number(layerRotateEl.value || 0),
    });
    canvas.requestRenderAll();
    refreshLayers();
  }

  function saveLocal() {
    normalizeBackgroundLibrary();
    const payload = {
      templateType: templateTypeEl.value,
      photoShape: photoShapeEl.value,
      assetUrls,
      background_library: backgroundLibrary,
      json: canvas.toJSON(["customId"])
    };
    localStorage.setItem("fabric_print_studio_design", JSON.stringify(payload));
    setStatus("Saved to browser local storage.");
  }

  async function saveServer() {
    normalizeBackgroundLibrary();
    const payload = {
      templateType: templateTypeEl.value,
      photoShape: photoShapeEl.value,
      asset_urls: assetUrls,
      background_library: backgroundLibrary,
      json: canvas.toJSON(["customId"])
    };
    const activeInstitute = getActiveInstitute();
    if (!activeInstitute) {
      setStatus("Select institute first.", true);
      return;
    }
    const res = await fetch(`/api/fabric-design?institute=${encodeURIComponent(activeInstitute)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ institute: activeInstitute, design: payload })
    });
    const data = await res.json();
    if (!res.ok) {
      setStatus(data.error || "Server save failed.", true);
      return;
    }
    renderAssetLibrary();
    setStatus("Saved to server settings.");
  }

  async function loadServer(options = {}) {
    const silent = !!options.silent;
    const activeInstitute = getActiveInstitute();
    if (!activeInstitute) {
      if (!silent) setStatus("Select institute first.", true);
      return;
    }
    const res = await fetch(`/api/fabric-design?institute=${encodeURIComponent(activeInstitute)}`);
    const data = await res.json();
    if (!res.ok) {
      if (!silent) setStatus(data.error || "Server load failed.", true);
      return;
    }
    const design = data.design || {};
    if (!design.json) {
      if (!silent) setStatus("No server design saved yet.");
      return;
    }
    templateTypeEl.value = design.templateType || "horizontal";
    photoShapeEl.value = design.photoShape || "rectangle";
    assetUrls = (design.asset_urls && typeof design.asset_urls === "object") ? design.asset_urls : {};
    backgroundLibrary = Array.isArray(design.background_library) ? design.background_library : [];
    normalizeBackgroundLibrary();
    setTemplateSize(templateTypeEl.value);
    canvas.loadFromJSON(design.json, () => {
      canvas.renderAll();
      Promise.resolve()
        .then(async () => {
          const mappings = [
            "background_image",
            "logo_image",
            "sign_image",
            "employee_photo",
          ];
          for (const id of mappings) {
            const url = assetUrls[id];
            if (!url) continue;
            const s = getSlotForAssetId(id);
            await placeImageFromUrl(url, id, s.left, s.top, s.width, s.height);
          }
        })
        .finally(() => {
          refreshLayers();
          renderAssetLibrary();
          if (!silent) setStatus("Loaded server design.");
        });
    });
  }

  async function uploadAssetToServer(file, assetType) {
    const activeInstitute = getActiveInstitute();
    if (!activeInstitute) {
      throw new Error("Select institute first");
    }
    const form = new FormData();
    form.append("asset", file);
    form.append("asset_type", assetType);
    form.append("institute", activeInstitute);
    const res = await fetch("/api/fabric-assets/upload", {
      method: "POST",
      body: form,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      throw new Error(data.error || "Upload failed");
    }
    return data.url || "";
  }

  function sanitizeFilePart(value, fallback = "batch") {
    const cleaned = String(value || "")
      .replace(/[^a-zA-Z0-9_\- ]+/g, "")
      .trim()
      .replace(/\s+/g, "_");
    return cleaned || fallback;
  }

  function getBatchEmployeesForExport() {
    return employees.filter((emp) => !emp.__fallback);
  }

  function renderAssetLibrary() {
    if (!assetLibraryEl) return;
    assetLibraryEl.innerHTML = Object.entries(assetConfig).map(([id, cfg]) => {
      const url = assetUrls[id] || "";
      const primaryLabel = id === "background_image" ? "Add" : (url ? "Replace" : "Upload");
      const preview = url ? `<img src="${url}" alt="${cfg.label}">` : `<span>No file</span>`;
      const bgSelect = id === "background_image"
        ? `<select class="asset-select" data-asset-action="select-bg">
             ${backgroundLibrary.map((bgUrl, idx) => `<option value="${bgUrl}"${assetUrls.background_image === bgUrl ? " selected" : ""}>BG ${idx + 1}</option>`).join("") || '<option value="">No background</option>'}
           </select>`
        : "";
      return `<div class="asset-card">
        <div class="asset-title">${cfg.label}</div>
        <div class="asset-preview">${preview}</div>
        ${bgSelect}
        <div class="row2">
          <button class="btn" type="button" data-asset-action="replace" data-asset-id="${id}">${primaryLabel}</button>
          <button class="btn" type="button" data-asset-action="remove" data-asset-id="${id}" ${url ? "" : "disabled"}>Remove</button>
        </div>
      </div>`;
    }).join("");
    assetLibraryEl.querySelectorAll("[data-asset-action]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const action = btn.getAttribute("data-asset-action");
        const id = btn.getAttribute("data-asset-id");
        if (!id || !assetConfig[id]) return;
        if (action === "replace") {
          const input = document.getElementById(assetConfig[id].inputId);
          if (input) {
            input.click();
          } else {
            setStatus("Upload input not found. Refresh page once.", true);
          }
          return;
        }
        if (action === "remove") {
          await removeAsset(id);
        }
      });
    });
    assetLibraryEl.querySelectorAll('[data-asset-action="select-bg"]').forEach((selectEl) => {
      selectEl.addEventListener("change", async () => {
        await applyBackgroundFromLibrary(selectEl.value || "");
        renderAssetLibrary();
      });
    });
  }

  async function removeAsset(id) {
    const existingUrl = assetUrls[id];
    if (!existingUrl) {
      renderAssetLibrary();
      return;
    }
    try {
      const activeInstitute = getActiveInstitute();
      const res = await fetch("/api/fabric-assets/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ institute: activeInstitute, url: existingUrl }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setStatus(data.error || "Unable to remove asset.", true);
        return;
      }
      delete assetUrls[id];
      if (id === "background_image") {
        backgroundLibrary = backgroundLibrary.filter((url) => url !== existingUrl);
      }
      const node = findById(id);
      if (node) {
        canvas.remove(node);
      }
      if (id === "employee_photo" && selectedEmployee.photo_url) {
        const s = getSlotForAssetId("employee_photo");
        await placeImageFromUrl(selectedEmployee.photo_url, "employee_photo", s.left, s.top, s.width, s.height);
      } else {
        canvas.requestRenderAll();
      }
      renderAssetLibrary();
      setStatus(`${assetConfig[id].label} removed.`);
    } catch {
      setStatus("Unable to remove asset.", true);
    }
  }

  async function applyEmployeeDataToCanvas(employee) {
    const nameNode = findById("name");
    const desNode = findById("designation");
    const idNode = findById("employee_id");
    const depNode = findById("department");
    const instNode = findById("institute");
    if (nameNode) nameNode.set("text", employee.name || "-");
    if (desNode) desNode.set("text", employee.designation || "-");
    if (idNode) idNode.set("text", `ID: ${employee.employee_id || "-"}`);
    if (depNode) depNode.set("text", `Dept: ${employee.department || "-"}`);
    if (instNode) instNode.set("text", employee.institute_name || getActiveInstitute() || "Institute");

    const existingPhoto = findById("employee_photo");
    if (existingPhoto) canvas.remove(existingPhoto);
    const slot = findById("photo_slot");
    if (slot && employee.photo_url) {
      await placeImageFromUrl(
        employee.photo_url,
        "employee_photo",
        slot.left || 0,
        slot.top || 0,
        slot.width || 120,
        slot.height || 120
      );
    } else {
      canvas.requestRenderAll();
    }
  }

  async function exportBatchZip() {
    if (isBatchExporting) return;
    const batchEmployees = getBatchEmployeesForExport();
    if (!batchEmployees.length) {
      setStatus("No batch records found for ZIP export.", true);
      return;
    }
    isBatchExporting = true;
    const originalEmployee = selectedEmployee;
    const originalIndex = currentCardIndex;
    const zip = new JSZip();
    setStatus(`Preparing ZIP for ${batchEmployees.length} cards...`);
    try {
      for (let i = 0; i < batchEmployees.length; i += 1) {
        const employee = batchEmployees[i];
        await applyEmployeeDataToCanvas(employee);
        const dataUrl = canvas.toDataURL({ format: "png", multiplier: 4, quality: 1 });
        const base64 = dataUrl.split(",")[1];
        const filePart = sanitizeFilePart(employee.employee_id || employee.key || `card_${i + 1}`, `card_${i + 1}`);
        zip.file(`${filePart}.png`, base64, { base64: true });
      }
      const blob = await zip.generateAsync({ type: "blob" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      const institutePart = sanitizeFilePart(getActiveInstitute() || "institute", "institute");
      const batchPart = sanitizeFilePart(getActiveBatch() || "batch", "batch");
      link.download = `${institutePart}_${batchPart}_cards_hires.zip`;
      link.click();
      setStatus(`Batch ZIP exported (${batchEmployees.length} cards).`);
    } catch (err) {
      setStatus(`Batch ZIP failed: ${err && err.message ? err.message : "unknown error"}`, true);
    } finally {
      selectedEmployee = originalEmployee;
      currentCardIndex = originalIndex;
      await applyEmployeeDataToCanvas(selectedEmployee);
      updateCardPosition();
      isBatchExporting = false;
    }
  }

  async function exportBatchPdfA4() {
    if (isBatchExporting) return;
    const batchEmployees = getBatchEmployeesForExport();
    if (!batchEmployees.length) {
      setStatus("No batch records found for PDF export.", true);
      return;
    }
    isBatchExporting = true;
    const originalEmployee = selectedEmployee;
    const originalIndex = currentCardIndex;
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: "mm", format: "a4", orientation: "portrait" });
    const pageW = 210;
    const pageH = 297;
    const marginLeft = 10;
    const marginTop = 10;
    const marginRight = 10;
    const marginBottom = 10;
    const cols = 2;
    const rows = 5;
    const gapX = 3;
    const gapY = 3;
    const slotW = (pageW - marginLeft - marginRight - ((cols - 1) * gapX)) / cols;
    const slotH = (pageH - marginTop - marginBottom - ((rows - 1) * gapY)) / rows;
    const cardRatio = canvas.getWidth() / canvas.getHeight();
    setStatus(`Preparing PDF for ${batchEmployees.length} cards...`);
    try {
      for (let i = 0; i < batchEmployees.length; i += 1) {
        if (i > 0 && i % 10 === 0) {
          pdf.addPage("a4", "portrait");
        }
        const employee = batchEmployees[i];
        await applyEmployeeDataToCanvas(employee);
        const dataUrl = canvas.toDataURL({ format: "png", multiplier: 3, quality: 1 });
        const localIndex = i % 10;
        const row = Math.floor(localIndex / cols);
        const col = localIndex % cols;
        const x0 = marginLeft + (col * (slotW + gapX));
        const y0 = marginTop + (row * (slotH + gapY));

        let drawW = slotW;
        let drawH = drawW / cardRatio;
        if (drawH > slotH) {
          drawH = slotH;
          drawW = drawH * cardRatio;
        }
        const drawX = x0 + ((slotW - drawW) / 2);
        const drawY = y0 + ((slotH - drawH) / 2);
        pdf.addImage(dataUrl, "PNG", drawX, drawY, drawW, drawH, undefined, "FAST");
      }

      const institutePart = sanitizeFilePart(getActiveInstitute() || "institute", "institute");
      const batchPart = sanitizeFilePart(getActiveBatch() || "batch", "batch");
      pdf.save(`${institutePart}_${batchPart}_cards_a4.pdf`);
      setStatus(`Batch PDF exported (${batchEmployees.length} cards, A4 10/page).`);
    } catch (err) {
      setStatus(`Batch PDF failed: ${err && err.message ? err.message : "unknown error"}`, true);
    } finally {
      selectedEmployee = originalEmployee;
      currentCardIndex = originalIndex;
      await applyEmployeeDataToCanvas(selectedEmployee);
      updateCardPosition();
      isBatchExporting = false;
    }
  }

  function wireUpload(buttonId, inputEl, id, fallbackRectId) {
    const triggerBtn = document.getElementById(buttonId);
    if (triggerBtn) {
      triggerBtn.addEventListener("click", () => inputEl.click());
    }
    inputEl.addEventListener("change", async () => {
      const file = inputEl.files && inputEl.files[0];
      if (!file) return;
      const typeMap = {
        background_image: "background",
        employee_photo: "photo",
        logo_image: "logo",
        sign_image: "signature",
      };
      const targetType = typeMap[id] || "photo";
      try {
        setStatus(`Uploading ${targetType}...`);
        const persistentUrl = await uploadAssetToServer(file, targetType);
        if (!persistentUrl) {
          throw new Error("No URL returned");
        }
        assetUrls[id] = persistentUrl;
        const slot = findById(fallbackRectId);
        const left = slot ? slot.left : 10;
        const top = slot ? slot.top : 10;
        const width = slot ? slot.width : 180;
        const height = slot ? slot.height : 110;
        await placeImageFromUrl(persistentUrl, id, left, top, width, height);
        if (id === "background_image") {
          normalizeBackgroundLibrary();
        }
        renderAssetLibrary();
        setStatus(`${targetType} uploaded and linked.`);
      } catch (err) {
        setStatus(`${targetType} upload failed: ${err && err.message ? err.message : "unknown error"}`, true);
      }
      inputEl.value = "";
    });
  }

  async function loadRecordsForSelection(options = {}) {
    const autoLoadDesign = !!options.autoLoadDesign;
    const activeInstitute = getActiveInstitute();
    const activeBatch = getActiveBatch();
    currentInstitute = activeInstitute || "";
    currentBatchId = activeBatch || "";

    if (!activeInstitute || !activeBatch) {
      employees = [normalizeEmployee(fallbackRecord || {}, 0, true)];
      currentCardIndex = 0;
      selectedEmployee = employees[0];
      await drawLayout();
      if (autoLoadDesign) {
        await loadServer({ silent: true });
      }
      updateCardPosition();
      setStatus("Select institute and batch.");
      return;
    }

    try {
      const res = await fetch(`/api/records?institute=${encodeURIComponent(activeInstitute)}&batch_id=${encodeURIComponent(activeBatch)}`);
      const data = await res.json();
      const rows = Array.isArray(data.records) ? data.records : [];
      employees = rows.length
        ? rows.map((row, idx) => normalizeEmployee(row, idx))
        : [normalizeEmployee({ institute_name: activeInstitute }, 0, true)];
      currentCardIndex = 0;
      selectedEmployee = employees[0];
      await drawLayout();
      if (autoLoadDesign) {
        await loadServer({ silent: true });
      }
      updateCardPosition();
      setStatus(rows.length ? `${rows.length} card records loaded.` : "No records in this batch.");
    } catch {
      setStatus("Unable to load batch records.", true);
    }
  }

  function populateBatchOptions() {
    const activeInstitute = getActiveInstitute();
    const batches = instituteBatches[activeInstitute] || [];
    batchSelectEl.innerHTML = batches.map((batch) => `<option value="${batch.id}">${batch.name}</option>`).join("");
    if (!batches.length) {
      batchSelectEl.innerHTML = '<option value="">No batch</option>';
      return;
    }
    const matched = batches.find((batch) => batch.id === currentBatchId);
    batchSelectEl.value = matched ? matched.id : batches[0].id;
  }

  async function loadInstituteBatchOptions() {
    try {
      const res = await fetch("/api/batch-overview");
      const data = await res.json();
      const batches = Array.isArray(data.batches) ? data.batches : [];
      const grouped = {};
      batches.forEach((item) => {
        const inst = String(item.institute_name || "").trim();
        const id = String(item.id || "").trim();
        if (!inst || !id) return;
        if (!grouped[inst]) grouped[inst] = [];
        grouped[inst].push({ id, name: String(item.batch_name || id) });
      });
      instituteBatches = grouped;
      const institutes = Object.keys(grouped).sort((a, b) => a.localeCompare(b));
      instituteSelectEl.innerHTML = institutes.map((inst) => `<option value="${inst}">${inst}</option>`).join("");
      if (!institutes.length) {
        instituteSelectEl.innerHTML = '<option value="">No institute</option>';
        batchSelectEl.innerHTML = '<option value="">No batch</option>';
        return;
      }
      if (!currentInstitute || !grouped[currentInstitute]) {
        currentInstitute = institutes[0];
      }
      instituteSelectEl.value = currentInstitute;
      populateBatchOptions();
      currentBatchId = batchSelectEl.value || "";
      await loadRecordsForSelection({ autoLoadDesign: true });
    } catch {
      setStatus("Unable to load institute/batch list.", true);
    }
  }

  function wireEvents() {
    templateTypeEl.addEventListener("change", drawLayout);
    photoShapeEl.addEventListener("change", () => {
      const photo = findById("employee_photo");
      if (photo) {
        applyPhotoClip(photo);
        canvas.requestRenderAll();
      }
    });
    instituteSelectEl.addEventListener("change", async () => {
      currentInstitute = instituteSelectEl.value || "";
      currentBatchId = "";
      populateBatchOptions();
      await loadRecordsForSelection({ autoLoadDesign: true });
      await loadStudioStorageStatus();
    });
    batchSelectEl.addEventListener("change", async () => {
      currentBatchId = batchSelectEl.value || "";
      await loadRecordsForSelection({ autoLoadDesign: false });
    });
    document.getElementById("prevCardBtn").addEventListener("click", async () => {
      if (!employees.length) return;
      currentCardIndex = (currentCardIndex - 1 + employees.length) % employees.length;
      selectedEmployee = employees[currentCardIndex];
      await applyEmployeeDataToCanvas(selectedEmployee);
      updateCardPosition();
    });
    document.getElementById("nextCardBtn").addEventListener("click", async () => {
      if (!employees.length) return;
      currentCardIndex = (currentCardIndex + 1) % employees.length;
      selectedEmployee = employees[currentCardIndex];
      await applyEmployeeDataToCanvas(selectedEmployee);
      updateCardPosition();
    });
    document.getElementById("applyBgBtn").addEventListener("click", () => {
      const bg = findById("background");
      if (!bg) return;
      bg.set("fill", new fabric.Gradient({
        type: "linear",
        gradientUnits: "pixels",
        coords: { x1: 0, y1: 0, x2: canvas.getWidth(), y2: canvas.getHeight() },
        colorStops: [
          { offset: 0, color: bgStartEl.value },
          { offset: 1, color: bgEndEl.value }
        ]
      }));
      canvas.requestRenderAll();
    });

    document.getElementById("applyLayerBtn").addEventListener("click", applySelectedControls);
    layerSelectEl.addEventListener("change", () => {
      const obj = findById(layerSelectEl.value);
      if (!obj) return;
      canvas.setActiveObject(obj);
      canvas.requestRenderAll();
      syncSelectedControls();
      refreshLayers();
    });

    document.getElementById("bringFrontBtn").addEventListener("click", () => {
      const obj = canvas.getActiveObject();
      if (!obj) return;
      obj.bringToFront();
      canvas.requestRenderAll();
      refreshLayers();
    });
    document.getElementById("sendBackBtn").addEventListener("click", () => {
      const obj = canvas.getActiveObject();
      if (!obj) return;
      obj.sendBackwards();
      canvas.requestRenderAll();
      refreshLayers();
    });
    document.getElementById("toggleLockBtn").addEventListener("click", () => {
      const obj = canvas.getActiveObject();
      if (!obj) return;
      const lock = !obj.lockMovementX;
      obj.set({
        lockMovementX: lock,
        lockMovementY: lock,
        lockScalingX: lock,
        lockScalingY: lock,
        lockRotation: lock,
        selectable: !lock
      });
      canvas.discardActiveObject();
      canvas.requestRenderAll();
      refreshLayers();
    });
    document.getElementById("toggleHideBtn").addEventListener("click", () => {
      const obj = canvas.getActiveObject();
      if (!obj) return;
      obj.visible = !obj.visible;
      canvas.requestRenderAll();
      refreshLayers();
    });

    document.getElementById("saveLocalBtn").addEventListener("click", saveLocal);
    document.getElementById("saveServerBtn").addEventListener("click", saveServer);
    document.getElementById("loadServerBtn").addEventListener("click", loadServer);
    document.getElementById("exportBtn").addEventListener("click", exportPng);
    document.getElementById("batchZipBtn").addEventListener("click", exportBatchZip);
    document.getElementById("batchPdfBtn").addEventListener("click", exportBatchPdfA4);

    wireUpload("uploadBgBtn", bgInputEl, "background_image", "background");
    wireUpload("uploadPhotoBtn", photoInputEl, "employee_photo", "photo_slot");
    wireUpload("uploadLogoBtn", logoInputEl, "logo_image", "logo_slot");
    wireUpload("uploadSignBtn", signInputEl, "sign_image", "signature_slot");

    canvas.on("selection:created", () => { syncSelectedControls(); refreshLayers(); });
    canvas.on("selection:updated", () => { syncSelectedControls(); refreshLayers(); });
    canvas.on("object:modified", () => { syncSelectedControls(); refreshLayers(); });
  }

  async function init() {
    updateCardPosition();
    renderStudioStorageStatus();
    await drawLayout();
    wireEvents();
    await loadInstituteBatchOptions();
    await loadStudioStorageStatus();
    renderAssetLibrary();
    setStatus("Fabric Print Studio ready. Use institute + batch and Backward/Forward.");
  }

  init();
})();
</script>
</body>
</html>
