<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4efe7;
    --panel:#fffdf9;
    --line:#dfd2c2;
    --text:#2f2016;
    --muted:#7a6b5f;
    --accent:#8b0000;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Source Sans 3",sans-serif;
    color:var(--text);
    min-height:100vh;
    background:
      radial-gradient(circle at top left, rgba(139,0,0,0.08), transparent 26%),
      linear-gradient(180deg,#faf6f1 0%,var(--bg) 100%);
    padding:14px;
  }
  .app{max-width:1520px;margin:0 auto;display:grid;gap:12px}
  .top{
    border:1px solid var(--line);
    border-radius:16px;
    background:var(--panel);
    padding:10px;
    display:grid;
    gap:8px;
  }
  .top-row{
    display:grid;
    grid-template-columns:200px 180px 180px 180px 1fr 150px 150px;
    gap:8px;
    align-items:center;
  }
  .title{
    font-family:"Playfair Display",serif;
    font-size:24px;
    color:#3c2618;
    letter-spacing:.2px;
  }
  .field{display:grid;gap:4px}
  .field label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .field select,.field input,.field textarea{
    width:100%;
    border:1px solid var(--line);
    border-radius:9px;
    padding:7px 9px;
    font:inherit;
    background:#fff;
    color:var(--text);
    font-size:13px;
  }
  .field textarea{min-height:58px;resize:vertical}
  .btn{
    border:1px solid var(--line);
    background:#fff;
    color:var(--text);
    border-radius:10px;
    padding:8px 10px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }
  .btn.primary{background:var(--accent);color:#fff;border-color:transparent}
  .btn-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
  .shell{
    display:grid;
    grid-template-columns:360px minmax(0,1fr) 320px;
    gap:12px;
    align-items:start;
  }
  .panel{
    border:1px solid var(--line);
    border-radius:16px;
    background:var(--panel);
    overflow:hidden;
  }
  .panel-head{
    border-bottom:1px solid var(--line);
    padding:8px 10px;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.8px;
    font-weight:700;
    color:#5c493c;
    background:#fff;
  }
  .panel-body{padding:10px;display:grid;gap:10px}
  .group{
    border:1px solid var(--line);
    border-radius:12px;
    background:#fff;
    padding:8px;
    display:grid;
    gap:8px;
  }
  .group h3{font-size:13px;color:#3d2a1d}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .hint{font-size:11px;color:var(--muted)}
  #stageWrap{
    border:1px solid var(--line);
    border-radius:16px;
    background:
      linear-gradient(180deg,rgba(255,255,255,.84),rgba(255,255,255,.94)),
      repeating-linear-gradient(0deg,transparent,transparent 22px,rgba(139,0,0,.03) 22px,rgba(139,0,0,.03) 23px),
      repeating-linear-gradient(90deg,transparent,transparent 22px,rgba(139,0,0,.03) 22px,rgba(139,0,0,.03) 23px);
    padding:10px;
    min-height:560px;
    display:grid;
    place-items:start center;
  }
  #konvaRoot{
    border:1px solid #c8b7a5;
    border-radius:10px;
    overflow:hidden;
    background:#fff;
  }
  .status{font-size:12px;color:#6f5f52;min-height:16px}
  .tiny{font-size:11px;color:var(--muted)}
  .layer-list{
    border:1px solid var(--line);
    border-radius:10px;
    background:#fff;
    max-height:260px;
    overflow:auto;
    display:grid;
    gap:4px;
    padding:6px;
  }
  .layer-item{
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
    padding:6px 7px;
    display:flex;
    justify-content:space-between;
    gap:8px;
    cursor:pointer;
    font-size:12px;
  }
  .layer-item.active{
    border-color:#9b3b2d;
    box-shadow:0 5px 10px rgba(129,47,24,.12);
    background:#fff8f3;
  }
  .layer-item .muted{color:#857668;font-size:11px}
  .inline-check{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:12px;
    color:#5f5043;
  }
  .inline-check input{width:14px;height:14px}
  @media (max-width:1320px){
    .top-row{grid-template-columns:1fr 1fr}
    .shell{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<main class="app">
  <section class="top">
    <div class="top-row">
      <div class="title">ID Card Designer</div>
      <div class="field">
        <label>Template</label>
        <select id="templateType">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
          <option value="badge">Badge</option>
          <option value="mini">Mini</option>
        </select>
      </div>
      <div class="field">
        <label>Photo Shape</label>
        <select id="photoShape">
          <option value="rectangle">Rectangle</option>
          <option value="rounded">Rounded</option>
          <option value="circle">Circle</option>
        </select>
      </div>
      <div class="field">
        <label>Employee Record</label>
        <select id="employeeSelect"></select>
      </div>
      <div class="field">
        <label>Preview Zoom</label>
        <select id="previewScale">
          <option value="fit">Fit</option>
          <option value="45">45%</option>
          <option value="55" selected>55%</option>
          <option value="65">65%</option>
          <option value="75">75%</option>
        </select>
      </div>
      <button class="btn primary" id="saveDesignBtn" type="button">Save Design</button>
      <button class="btn" id="loadDesignBtn" type="button">Load Last</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="uploadBackgroundBtn" type="button">Upload Background</button>
      <button class="btn" id="uploadLogoBtn" type="button">Upload Logo</button>
      <button class="btn" id="uploadSignatureBtn" type="button">Upload Signature</button>
      <button class="btn primary" id="exportPngBtn" type="button">Export PNG (Hi-Res)</button>
    </div>
    <div class="status" id="topStatus">Ready. Build: print-lab-2026-04-11-02-20</div>
  </section>

  <section class="shell">
    <aside class="panel">
      <div class="panel-head">Manual Controls</div>
      <div class="panel-body">
        <article class="group">
          <h3>Background</h3>
          <div class="row2">
            <div class="field">
              <label>Solid Color</label>
              <input id="bgColor" type="color" value="#ffffff">
            </div>
            <div class="field">
              <label>Gradient End</label>
              <input id="bgGradientEnd" type="color" value="#f3f6fa">
            </div>
          </div>
          <div class="row2">
            <div class="field">
              <label>Gradient Angle</label>
              <input id="bgGradientAngle" type="range" min="0" max="360" value="130">
            </div>
            <div class="field">
              <label>BG Opacity</label>
              <input id="bgImageOpacity" type="range" min="0" max="100" value="100">
            </div>
          </div>
        </article>

        <article class="group">
          <h3>Field Positioning</h3>
          <div class="field">
            <label>Select Field/Layer</label>
            <select id="layerSelect"></select>
          </div>
          <div class="row2">
            <div class="field">
              <label>X</label>
              <input id="layerX" type="range" min="-100" max="1000" value="0">
            </div>
            <div class="field">
              <label>Y</label>
              <input id="layerY" type="range" min="-100" max="1000" value="0">
            </div>
          </div>
          <div class="row2">
            <div class="field">
              <label>Scale %</label>
              <input id="layerScale" type="range" min="20" max="220" value="100">
            </div>
            <div class="field">
              <label>Rotate</label>
              <input id="layerRotate" type="range" min="-180" max="180" value="0">
            </div>
          </div>
          <div class="row2">
            <button class="btn" id="centerLayerBtn" type="button">Center Selected</button>
            <button class="btn" id="resetLayerBtn" type="button">Reset Selected</button>
          </div>
          <div class="row3">
            <button class="btn" id="alignLeftBtn" type="button">Align Left</button>
            <button class="btn" id="alignCenterBtn" type="button">Align Center</button>
            <button class="btn" id="alignRightBtn" type="button">Align Right</button>
          </div>
          <div class="row3">
            <button class="btn" id="alignTopBtn" type="button">Align Top</button>
            <button class="btn" id="alignMiddleBtn" type="button">Align Middle</button>
            <button class="btn" id="alignBottomBtn" type="button">Align Bottom</button>
          </div>
        </article>

        <article class="group">
          <h3>Print Guides</h3>
          <label class="inline-check"><input id="showGuidesCheck" type="checkbox" checked>Show Trim/Safe/Bleed</label>
          <div class="row2">
            <div class="field">
              <label>Bleed (px)</label>
              <input id="bleedPx" type="range" min="0" max="40" value="12">
            </div>
            <div class="field">
              <label>Safe Margin (px)</label>
              <input id="safePx" type="range" min="8" max="80" value="30">
            </div>
          </div>
          <label class="inline-check"><input id="snapCheck" type="checkbox" checked>Snap To Guides/Center</label>
        </article>

        <article class="group">
          <h3>QR & Barcode</h3>
          <div class="field">
            <label>QR Value</label>
            <input id="qrInput" type="text" placeholder="Auto from employee ID">
          </div>
          <div class="field">
            <label>Barcode Value</label>
            <input id="barcodeInput" type="text" placeholder="Auto from employee ID">
          </div>
          <div class="row2">
            <button class="btn" id="toggleQrBtn" type="button">Toggle QR</button>
            <button class="btn" id="toggleBarcodeBtn" type="button">Toggle Barcode</button>
          </div>
        </article>
      </div>
    </aside>

    <section id="stageWrap">
      <div id="konvaRoot"></div>
    </section>

    <aside class="panel">
      <div class="panel-head">Batch & Data</div>
      <div class="panel-body">
        <article class="group">
          <h3>CSV Batch Export</h3>
          <div class="field">
            <label>CSV File</label>
            <input id="csvInput" type="file" accept=".csv">
          </div>
          <div class="row2">
            <button class="btn" id="previewCsvBtn" type="button">Preview Rows</button>
            <button class="btn primary" id="exportBatchBtn" type="button">Export ZIP</button>
          </div>
          <div class="status" id="batchStatus">No CSV loaded.</div>
        </article>

        <article class="group">
          <h3>Layer Manager</h3>
          <div class="layer-list" id="layerList"></div>
          <div class="row2">
            <button class="btn" id="toggleLockBtn" type="button">Lock/Unlock</button>
            <button class="btn" id="toggleHideBtn" type="button">Hide/Show</button>
          </div>
          <div class="row2">
            <button class="btn" id="moveUpBtn" type="button">Move Up</button>
            <button class="btn" id="moveDownBtn" type="button">Move Down</button>
          </div>
        </article>
      </div>
    </aside>
  </section>
</main>

<input id="bgFileInput" type="file" accept="image/*" hidden>
<input id="logoFileInput" type="file" accept="image/*" hidden>
<input id="signFileInput" type="file" accept="image/*" hidden>

<script src="https://cdn.jsdelivr.net/npm/konva@9.3.22/konva.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
(() => {
  const records = {{ records|tojson }};
  const fallbackRecord = {{ sample_record|tojson }};
  const allEmployees = (Array.isArray(records) && records.length ? records : [fallbackRecord]).map((row, idx) => normalizeEmployee(row, idx));

  const templateTypeEl = document.getElementById('templateType');
  const photoShapeEl = document.getElementById('photoShape');
  const employeeSelectEl = document.getElementById('employeeSelect');
  const previewScaleEl = document.getElementById('previewScale');
  const layerSelectEl = document.getElementById('layerSelect');
  const layerListEl = document.getElementById('layerList');
  const layerXEl = document.getElementById('layerX');
  const layerYEl = document.getElementById('layerY');
  const layerScaleEl = document.getElementById('layerScale');
  const layerRotateEl = document.getElementById('layerRotate');
  const bgColorEl = document.getElementById('bgColor');
  const bgGradientEndEl = document.getElementById('bgGradientEnd');
  const bgGradientAngleEl = document.getElementById('bgGradientAngle');
  const bgImageOpacityEl = document.getElementById('bgImageOpacity');
  const showGuidesCheckEl = document.getElementById('showGuidesCheck');
  const bleedPxEl = document.getElementById('bleedPx');
  const safePxEl = document.getElementById('safePx');
  const snapCheckEl = document.getElementById('snapCheck');
  const qrInputEl = document.getElementById('qrInput');
  const barcodeInputEl = document.getElementById('barcodeInput');
  const topStatusEl = document.getElementById('topStatus');
  const batchStatusEl = document.getElementById('batchStatus');

  const bgInputEl = document.getElementById('bgFileInput');
  const logoInputEl = document.getElementById('logoFileInput');
  const signInputEl = document.getElementById('signFileInput');
  const csvInputEl = document.getElementById('csvInput');

  const stageRoot = document.getElementById('konvaRoot');
  const stageWrapEl = document.getElementById('stageWrap');
  let stage = null;
  let layer = null;
  let guideLayer = null;
  let selectedEmployee = allEmployees[0];
  let parsedCsvRows = [];

  const state = {
    templateType: 'horizontal',
    photoShape: 'rectangle',
    bg: { start: '#ffffff', end: '#f3f6fa', angle: 130, imageOpacity: 1, imageObj: null },
    assets: { logo: null, signature: null, cardBg: null, employeePhoto: null },
    visibility: { qr: true, barcode: true },
    nodes: {},
    defaults: {},
    layerMeta: {},
    guideSettings: { show: true, bleed: 12, safe: 30, snap: true },
    viewScale: 1,
  };

  const templates = {
    horizontal: { w: 980, h: 620 },
    vertical: { w: 680, h: 980 },
    badge: { w: 760, h: 760 },
    mini: { w: 620, h: 420 },
  };
  const SNAP_THRESHOLD = 8;
  const MAX_PREVIEW_SCALE = 0.62;

  function setStatus(text, kind = 'info') {
    topStatusEl.textContent = text;
    topStatusEl.style.color = kind === 'error' ? '#a2271b' : '#6f5f52';
  }

  function setBatchStatus(text, kind = 'info') {
    batchStatusEl.textContent = text;
    batchStatusEl.style.color = kind === 'error' ? '#a2271b' : '#6f5f52';
  }

  function normalizeEmployee(raw, idx) {
    return {
      key: String(raw.serial_no || raw.employee_id || raw.id || `EMP-${idx + 1}`),
      name: raw.name || 'Employee',
      designation: raw.designation || raw.training_year || raw.course || '',
      employee_id: raw.employee_id || raw.serial_no || raw.id || `EMP-${idx + 1}`,
      department: raw.department || '',
      contact: raw.contact || '',
      dob: raw.dob || '',
      valid_upto: raw.valid_upto || '',
      photo_url: raw.photo_url || '',
      institute_name: raw.institute_name || '',
    };
  }

  function buildGradientFill(width, height) {
    const angle = Number(bgGradientAngleEl.value || 130) * Math.PI / 180;
    const cx = width / 2;
    const cy = height / 2;
    const len = Math.max(width, height);
    const dx = Math.cos(angle) * len;
    const dy = Math.sin(angle) * len;
    return {
      fillLinearGradientStartPoint: { x: cx - dx / 2, y: cy - dy / 2 },
      fillLinearGradientEndPoint: { x: cx + dx / 2, y: cy + dy / 2 },
      fillLinearGradientColorStops: [0, bgColorEl.value, 1, bgGradientEndEl.value],
    };
  }

  function createStage() {
    const cfg = templates[state.templateType];
    stageRoot.innerHTML = '';
    stage = new Konva.Stage({
      container: 'konvaRoot',
      width: cfg.w,
      height: cfg.h,
    });
    layer = new Konva.Layer();
    guideLayer = new Konva.Layer({ listening: false });
    stage.add(layer);
    stage.add(guideLayer);
  }

  function fitStageToViewport() {
    if (!stage || !stageWrapEl) return;
    const cfg = templates[state.templateType];
    const rect = stageWrapEl.getBoundingClientRect();
    const availableW = Math.max(320, rect.width - 28);
    const availableH = Math.max(320, window.innerHeight - 230);
    const fitScale = Math.min(MAX_PREVIEW_SCALE, availableW / cfg.w, availableH / cfg.h);
    const selected = previewScaleEl ? previewScaleEl.value : 'fit';
    const requestedScale = selected === 'fit' ? fitScale : Math.min(fitScale, (Number(selected) || 55) / 100);
    const scale = Number.isFinite(requestedScale) && requestedScale > 0 ? requestedScale : 1;
    state.viewScale = scale;
    stage.width(Math.round(cfg.w * scale));
    stage.height(Math.round(cfg.h * scale));
    stage.scale({ x: scale, y: scale });
    stage.batchDraw();
  }

  function getDesignSize() {
    const cfg = templates[state.templateType] || templates.horizontal;
    return { width: cfg.w, height: cfg.h };
  }

  function imageFromUrl(url) {
    return new Promise((resolve) => {
      if (!url) {
        resolve(null);
        return;
      }
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = url;
    });
  }

  async function loadEmployeePhoto() {
    state.assets.employeePhoto = await imageFromUrl(selectedEmployee.photo_url || '');
  }

  function addNode(name, node, snapshot = null) {
    state.nodes[name] = node;
    state.defaults[name] = {
      x: node.x(),
      y: node.y(),
      scaleX: node.scaleX(),
      scaleY: node.scaleY(),
      rotation: node.rotation(),
    };
    if (!state.layerMeta[name]) {
      state.layerMeta[name] = { locked: false, hidden: false };
    }
    const saved = snapshot && snapshot[name] ? snapshot[name] : null;
    if (saved) {
      if (typeof saved.x === 'number') node.x(saved.x);
      if (typeof saved.y === 'number') node.y(saved.y);
      if (typeof saved.sx === 'number') node.scaleX(saved.sx);
      if (typeof saved.sy === 'number') node.scaleY(saved.sy);
      if (typeof saved.r === 'number') node.rotation(saved.r);
      if (typeof saved.locked === 'boolean') state.layerMeta[name].locked = saved.locked;
      if (typeof saved.hidden === 'boolean') state.layerMeta[name].hidden = saved.hidden;
    }
    node.name(name);
    node.visible(!state.layerMeta[name].hidden);
    node.draggable(!state.layerMeta[name].locked);
    node.on('dragmove', () => {
      if (state.guideSettings.snap) {
        applySnap(node);
      }
      syncSelectedLayerControls();
      layer.draw();
    });
    node.on('dragend', () => syncSelectedLayerControls());
    layer.add(node);
  }

  function createPhotoClip(node, width, height) {
    if (state.photoShape === 'circle') {
      node.clipFunc((ctx) => {
        ctx.beginPath();
        ctx.arc(width / 2, height / 2, Math.min(width, height) / 2, 0, Math.PI * 2);
      });
      return;
    }
    if (state.photoShape === 'rounded') {
      const r = 20;
      node.clipFunc((ctx) => {
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(width - r, 0);
        ctx.quadraticCurveTo(width, 0, width, r);
        ctx.lineTo(width, height - r);
        ctx.quadraticCurveTo(width, height, width - r, height);
        ctx.lineTo(r, height);
        ctx.quadraticCurveTo(0, height, 0, height - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
      });
      return;
    }
    node.clipFunc(null);
  }

  function makeQrDataUrl(value) {
    return new Promise((resolve) => {
      const temp = document.createElement('div');
      const qr = new QRCode(temp, {
        text: value || 'N/A',
        width: 180,
        height: 180,
        colorDark: '#111111',
        colorLight: '#ffffff',
      });
      setTimeout(() => {
        const canvas = temp.querySelector('canvas');
        resolve(canvas ? canvas.toDataURL('image/png') : null);
      }, 40);
    });
  }

  function makeBarcodeDataUrl(value) {
    const canvas = document.createElement('canvas');
    JsBarcode(canvas, value || 'N/A', {
      format: 'CODE128',
      width: 2,
      height: 70,
      displayValue: false,
      margin: 4,
    });
    return canvas.toDataURL('image/png');
  }

  function getGuideTargets() {
    const cfg = templates[state.templateType];
    const bleed = Math.max(0, Math.min(Number(state.guideSettings.bleed || 0), Math.floor(Math.min(cfg.w, cfg.h) / 2)));
    const safe = Math.max(0, Math.min(Number(state.guideSettings.safe || 0), Math.floor(Math.min(cfg.w, cfg.h) / 2)));
    return {
      vertical: [0, bleed, safe, cfg.w / 2, cfg.w - safe, cfg.w - bleed, cfg.w],
      horizontal: [0, bleed, safe, cfg.h / 2, cfg.h - safe, cfg.h - bleed, cfg.h],
      bleed,
      safe,
    };
  }

  function applySnap(node) {
    if (!stage || !layer) return;
    const box = node.getClientRect({ relativeTo: layer });
    const targets = getGuideTargets();
    const xEdges = [
      { type: 'left', value: box.x },
      { type: 'center', value: box.x + box.width / 2 },
      { type: 'right', value: box.x + box.width },
    ];
    const yEdges = [
      { type: 'top', value: box.y },
      { type: 'middle', value: box.y + box.height / 2 },
      { type: 'bottom', value: box.y + box.height },
    ];

    let bestDx = 0;
    let bestDy = 0;
    let minX = SNAP_THRESHOLD + 1;
    let minY = SNAP_THRESHOLD + 1;

    xEdges.forEach((edge) => {
      targets.vertical.forEach((target) => {
        const diff = target - edge.value;
        const abs = Math.abs(diff);
        if (abs < minX && abs <= SNAP_THRESHOLD) {
          minX = abs;
          bestDx = diff;
        }
      });
    });
    yEdges.forEach((edge) => {
      targets.horizontal.forEach((target) => {
        const diff = target - edge.value;
        const abs = Math.abs(diff);
        if (abs < minY && abs <= SNAP_THRESHOLD) {
          minY = abs;
          bestDy = diff;
        }
      });
    });

    if (bestDx) node.x(node.x() + bestDx);
    if (bestDy) node.y(node.y() + bestDy);
  }

  function drawGuides() {
    if (!guideLayer || !stage) return;
    guideLayer.destroyChildren();
    if (!state.guideSettings.show) {
      guideLayer.draw();
      return;
    }

    const cfg = templates[state.templateType];
    const targets = getGuideTargets();
    const bleed = targets.bleed;
    const safe = targets.safe;

    const trimRect = new Konva.Rect({
      x: 0, y: 0, width: cfg.w, height: cfg.h,
      stroke: '#2f2016', strokeWidth: 1, dash: [7, 5],
    });
    guideLayer.add(trimRect);

    if (bleed > 0) {
      guideLayer.add(new Konva.Rect({
        x: bleed, y: bleed, width: cfg.w - (bleed * 2), height: cfg.h - (bleed * 2),
        stroke: '#aa1f1f', strokeWidth: 1, dash: [4, 4],
      }));
    }
    if (safe > 0) {
      guideLayer.add(new Konva.Rect({
        x: safe, y: safe, width: cfg.w - (safe * 2), height: cfg.h - (safe * 2),
        stroke: '#1f6b4f', strokeWidth: 1, dash: [4, 4],
      }));
    }

    guideLayer.add(new Konva.Line({
      points: [cfg.w / 2, 0, cfg.w / 2, cfg.h],
      stroke: '#6a5a4d',
      strokeWidth: 1,
      dash: [4, 6],
    }));
    guideLayer.add(new Konva.Line({
      points: [0, cfg.h / 2, cfg.w, cfg.h / 2],
      stroke: '#6a5a4d',
      strokeWidth: 1,
      dash: [4, 6],
    }));
    guideLayer.draw();
  }

  function captureLayerSnapshot() {
    if (!layer) return {};
    const snap = {};
    layer.getChildren().forEach((node, idx) => {
      const name = node.name();
      if (!name) return;
      const meta = state.layerMeta[name] || {};
      snap[name] = {
        x: node.x(),
        y: node.y(),
        sx: node.scaleX(),
        sy: node.scaleY(),
        r: node.rotation(),
        z: idx,
        locked: !!meta.locked,
        hidden: !node.visible() || !!meta.hidden,
      };
    });
    return snap;
  }

  function applyLayerOrdering(snapshot) {
    if (!layer || !snapshot) return;
    const entries = Object.entries(snapshot)
      .filter(([name]) => state.nodes[name])
      .sort((a, b) => (a[1].z ?? 0) - (b[1].z ?? 0));
    entries.forEach(([name], idx) => {
      state.nodes[name].zIndex(idx);
    });
  }

  async function drawCard(snapshot = null, keepSelected = null) {
    createStage();
    await loadEmployeePhoto();
    const cfg = templates[state.templateType];

    const bgRect = new Konva.Rect({
      x: 0, y: 0, width: cfg.w, height: cfg.h, stroke: '#bca88f', strokeWidth: 2,
    });
    bgRect.setAttrs(buildGradientFill(cfg.w, cfg.h));
    addNode('background', bgRect, snapshot);

    if (state.assets.cardBg) {
      addNode('background_image', new Konva.Image({
        x: 0, y: 0, width: cfg.w, height: cfg.h, image: state.assets.cardBg, opacity: Number(bgImageOpacityEl.value || 100) / 100,
      }), snapshot);
    }

    addNode('header_bar', new Konva.Rect({ x: 0, y: 0, width: cfg.w, height: Math.round(cfg.h * 0.16), fill: '#8b0000' }), snapshot);
    addNode('institute', new Konva.Text({
      x: 24, y: 18, text: selectedEmployee.institute_name || 'Institute Name', fill: '#ffffff',
      fontSize: 30, fontStyle: 'bold', fontFamily: 'Source Sans 3', width: cfg.w - 48,
    }), snapshot);

    const photoX = Math.round(cfg.w * 0.04);
    const photoY = Math.round(cfg.h * 0.22);
    const photoW = Math.round(cfg.w * 0.24);
    const photoH = Math.round(cfg.h * 0.44);
    const photoGroup = new Konva.Group({ x: photoX, y: photoY, width: photoW, height: photoH });
    const photoBg = new Konva.Rect({ x: 0, y: 0, width: photoW, height: photoH, fill: '#f2ece4', stroke: '#c5b5a2', strokeWidth: 1 });
    photoGroup.add(photoBg);
    if (state.assets.employeePhoto) {
      const p = new Konva.Image({ x: 0, y: 0, width: photoW, height: photoH, image: state.assets.employeePhoto });
      createPhotoClip(p, photoW, photoH);
      photoGroup.add(p);
    } else {
      photoGroup.add(new Konva.Text({ x: 0, y: photoH / 2 - 8, width: photoW, text: 'Photo', align: 'center', fill: '#8f7f70', fontSize: 16 }));
    }
    addNode('photo', photoGroup, snapshot);

    addNode('name', new Konva.Text({
      x: Math.round(cfg.w * 0.33),
      y: Math.round(cfg.h * 0.24),
      text: selectedEmployee.name || '-',
      fill: '#8b0000',
      fontSize: 42,
      fontStyle: 'bold',
      fontFamily: 'Source Sans 3',
      width: Math.round(cfg.w * 0.62),
    }), snapshot);
    addNode('designation', new Konva.Text({
      x: Math.round(cfg.w * 0.33),
      y: Math.round(cfg.h * 0.34),
      text: selectedEmployee.designation || '-',
      fill: '#9a6a18',
      fontSize: 26,
      fontStyle: 'bold',
      width: Math.round(cfg.w * 0.62),
    }), snapshot);

    const metaStartY = Math.round(cfg.h * 0.44);
    addNode('id', new Konva.Text({ x: Math.round(cfg.w * 0.33), y: metaStartY, text: `ID: ${selectedEmployee.employee_id || '-'}`, fill: '#1e1e1e', fontSize: 22 }), snapshot);
    addNode('department', new Konva.Text({ x: Math.round(cfg.w * 0.33), y: metaStartY + 36, text: `Dept: ${selectedEmployee.department || '-'}`, fill: '#1e1e1e', fontSize: 22 }), snapshot);
    addNode('contact', new Konva.Text({ x: Math.round(cfg.w * 0.33), y: metaStartY + 72, text: `Contact: ${selectedEmployee.contact || '-'}`, fill: '#1e1e1e', fontSize: 22 }), snapshot);

    const qrValue = qrInputEl.value.trim() || String(selectedEmployee.employee_id || selectedEmployee.key || 'N/A');
    const barcodeValue = barcodeInputEl.value.trim() || String(selectedEmployee.employee_id || selectedEmployee.key || 'N/A');
    const qrUrl = await makeQrDataUrl(qrValue);
    if (qrUrl && state.visibility.qr) {
      const qrImg = await imageFromUrl(qrUrl);
      addNode('qr', new Konva.Image({ x: Math.round(cfg.w * 0.76), y: Math.round(cfg.h * 0.62), width: 150, height: 150, image: qrImg }), snapshot);
    }
    if (state.visibility.barcode) {
      const barcodeUrl = makeBarcodeDataUrl(barcodeValue);
      const barcodeImg = await imageFromUrl(barcodeUrl);
      addNode('barcode', new Konva.Image({ x: Math.round(cfg.w * 0.04), y: Math.round(cfg.h * 0.86), width: Math.round(cfg.w * 0.45), height: 76, image: barcodeImg }), snapshot);
    }

    if (state.assets.logo) {
      addNode('logo', new Konva.Image({ x: Math.round(cfg.w - 170), y: 20, width: 140, height: 80, image: state.assets.logo }), snapshot);
    }
    if (state.assets.signature) {
      addNode('signature', new Konva.Image({ x: Math.round(cfg.w - 220), y: Math.round(cfg.h - 120), width: 180, height: 60, image: state.assets.signature }), snapshot);
    }

    applyLayerOrdering(snapshot);
    layer.draw();
    drawGuides();
    fitStageToViewport();
    rebuildLayerSelect();
    rebuildLayerList();
    const targetSelection = keepSelected && state.nodes[keepSelected]
      ? keepSelected
      : (layerSelectEl.options.length ? layerSelectEl.options[0].value : '');
    layerSelectEl.value = targetSelection;
    syncSelectedLayerControls();
  }

  function selectedNode() {
    const key = layerSelectEl.value;
    return state.nodes[key] || null;
  }

  function syncSelectedLayerControls() {
    const node = selectedNode();
    if (!node) return;
    layerXEl.value = String(Math.round(node.x()));
    layerYEl.value = String(Math.round(node.y()));
    layerScaleEl.value = String(Math.round((node.scaleX() || 1) * 100));
    layerRotateEl.value = String(Math.round(node.rotation() || 0));
  }

  function applyControlsToNode() {
    const node = selectedNode();
    if (!node) return;
    node.x(Number(layerXEl.value || 0));
    node.y(Number(layerYEl.value || 0));
    const sc = Number(layerScaleEl.value || 100) / 100;
    node.scaleX(sc);
    node.scaleY(sc);
    node.rotation(Number(layerRotateEl.value || 0));
    layer.draw();
  }

  function rebuildLayerSelect() {
    const names = layer ? layer.getChildren().map((n) => n.name()).filter(Boolean) : Object.keys(state.nodes);
    layerSelectEl.innerHTML = names.map((n) => `<option value="${n}">${n}</option>`).join('');
  }

  function rebuildLayerList() {
    if (!layerListEl || !layer) return;
    const ordered = layer.getChildren().map((n) => n.name()).filter(Boolean);
    const topFirst = [...ordered].reverse();
    const selected = layerSelectEl.value;
    layerListEl.innerHTML = topFirst.map((name) => {
      const meta = state.layerMeta[name] || {};
      const lockLabel = meta.locked ? 'Locked' : 'Free';
      const visLabel = meta.hidden ? 'Hidden' : 'Visible';
      const active = selected === name ? ' active' : '';
      return `<button class="layer-item${active}" data-layer="${name}" type="button"><span>${name}</span><span class="muted">${lockLabel} | ${visLabel}</span></button>`;
    }).join('');
    layerListEl.querySelectorAll('[data-layer]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const name = btn.getAttribute('data-layer');
        if (!name || !state.nodes[name]) return;
        layerSelectEl.value = name;
        syncSelectedLayerControls();
        rebuildLayerList();
      });
    });
  }

  function redrawKeepLayout() {
    const snapshot = captureLayerSnapshot();
    const selected = layerSelectEl.value;
    drawCard(snapshot, selected).catch(() => setStatus('Redraw failed.', 'error'));
  }

  function updateTemplateDimensions() {
    state.templateType = templateTypeEl.value;
    redrawKeepLayout();
  }

  function parseCsvText(text) {
    const lines = text.split(/\r?\n/).filter(Boolean);
    if (!lines.length) return [];
    const headers = lines[0].split(',').map((h) => h.trim());
    return lines.slice(1).map((line, idx) => {
      const cols = line.split(',');
      const row = {};
      headers.forEach((h, i) => {
        row[h] = (cols[i] || '').trim();
      });
      return normalizeEmployee(row, idx);
    });
  }

  function applyEmployee(emp) {
    selectedEmployee = emp;
    qrInputEl.value = selectedEmployee.employee_id || '';
    barcodeInputEl.value = selectedEmployee.employee_id || '';
    redrawKeepLayout();
  }

  function populateEmployeeSelect() {
    employeeSelectEl.innerHTML = allEmployees.map((e, idx) => `<option value="${idx}">${e.name} (${e.employee_id})</option>`).join('');
    employeeSelectEl.value = '0';
  }

  function wireFileLoader(buttonId, inputEl, targetKey) {
    document.getElementById(buttonId).addEventListener('click', () => inputEl.click());
    inputEl.addEventListener('change', async () => {
      if (!inputEl.files || !inputEl.files.length) return;
      const file = inputEl.files[0];
      const url = URL.createObjectURL(file);
      state.assets[targetKey] = await imageFromUrl(url);
      URL.revokeObjectURL(url);
      redrawKeepLayout();
      inputEl.value = '';
    });
  }

  function saveDesignLocal() {
    const payload = {
      templateType: state.templateType,
      photoShape: state.photoShape,
      bg: {
        start: bgColorEl.value,
        end: bgGradientEndEl.value,
        angle: Number(bgGradientAngleEl.value || 130),
        imageOpacity: Number(bgImageOpacityEl.value || 100),
      },
      layerStates: Object.keys(state.nodes).reduce((acc, name) => {
        const n = state.nodes[name];
        acc[name] = { x: n.x(), y: n.y(), sx: n.scaleX(), sy: n.scaleY(), r: n.rotation() };
        return acc;
      }, {}),
    };
    localStorage.setItem('id_designer_last_design', JSON.stringify(payload));
    setStatus('Design saved locally. Wire this to Supabase `designs` table next.');
  }

  function loadDesignLocal() {
    const raw = localStorage.getItem('id_designer_last_design');
    if (!raw) {
      setStatus('No saved local design found.', 'error');
      return;
    }
    try {
      const data = JSON.parse(raw);
      templateTypeEl.value = data.templateType || 'horizontal';
      photoShapeEl.value = data.photoShape || 'rectangle';
      bgColorEl.value = data.bg?.start || '#ffffff';
      bgGradientEndEl.value = data.bg?.end || '#f3f6fa';
      bgGradientAngleEl.value = String(data.bg?.angle || 130);
      bgImageOpacityEl.value = String(data.bg?.imageOpacity || 100);
      state.templateType = templateTypeEl.value;
      state.photoShape = photoShapeEl.value;
      drawCard().then(() => {
        Object.entries(data.layerStates || {}).forEach(([name, cfg]) => {
          if (!state.nodes[name]) return;
          state.nodes[name].x(cfg.x ?? state.nodes[name].x());
          state.nodes[name].y(cfg.y ?? state.nodes[name].y());
          state.nodes[name].scaleX(cfg.sx ?? 1);
          state.nodes[name].scaleY(cfg.sy ?? 1);
          state.nodes[name].rotation(cfg.r ?? 0);
        });
        layer.draw();
        syncSelectedLayerControls();
        rebuildLayerList();
      });
      setStatus('Loaded local design snapshot.');
    } catch {
      setStatus('Saved design is corrupted.', 'error');
    }
  }

  function exportPng(scale = 3) {
    if (!stage) return;
    const pixelRatio = Math.max(1, scale / (state.viewScale || 1));
    const dataUrl = stage.toDataURL({ pixelRatio, mimeType: 'image/png' });
    const link = document.createElement('a');
    link.href = dataUrl;
    link.download = `id-card-${selectedEmployee.employee_id || selectedEmployee.key}.png`;
    link.click();
    setStatus(`PNG exported at ${scale}x resolution.`);
  }

  async function exportBatchZip() {
    if (!parsedCsvRows.length) {
      setBatchStatus('Load CSV first.', 'error');
      return;
    }
    const zip = new JSZip();
    setBatchStatus(`Rendering ${parsedCsvRows.length} cards...`);
    const snapshot = captureLayerSnapshot();
    const keepSelected = layerSelectEl.value;
    const previousEmployee = selectedEmployee;
    const previousQr = qrInputEl.value;
    const previousBarcode = barcodeInputEl.value;
    for (let i = 0; i < parsedCsvRows.length; i += 1) {
      selectedEmployee = parsedCsvRows[i];
      qrInputEl.value = selectedEmployee.employee_id || '';
      barcodeInputEl.value = selectedEmployee.employee_id || '';
      await drawCard(snapshot, keepSelected);
      const pixelRatio = Math.max(1, 3 / (state.viewScale || 1));
      const base64 = stage.toDataURL({ pixelRatio }).split(',')[1];
      const fileName = `${parsedCsvRows[i].employee_id || parsedCsvRows[i].key || `row-${i + 1}`}.png`;
      zip.file(fileName, base64, { base64: true });
    }
    selectedEmployee = previousEmployee;
    qrInputEl.value = previousQr;
    barcodeInputEl.value = previousBarcode;
    await drawCard(snapshot, keepSelected);
    const blob = await zip.generateAsync({ type: 'blob' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'id-card-batch.zip';
    link.click();
    setBatchStatus(`Exported ZIP with ${parsedCsvRows.length} card(s).`);
  }

  function wireEvents() {
    templateTypeEl.addEventListener('change', updateTemplateDimensions);
    previewScaleEl.addEventListener('change', fitStageToViewport);
    photoShapeEl.addEventListener('change', () => {
      state.photoShape = photoShapeEl.value;
      redrawKeepLayout();
    });
    employeeSelectEl.addEventListener('change', () => {
      applyEmployee(allEmployees[Number(employeeSelectEl.value || 0)] || allEmployees[0]);
    });

    [layerXEl, layerYEl, layerScaleEl, layerRotateEl].forEach((input) => input.addEventListener('input', applyControlsToNode));
    layerSelectEl.addEventListener('change', () => {
      syncSelectedLayerControls();
      rebuildLayerList();
    });
    document.getElementById('centerLayerBtn').addEventListener('click', () => {
      const node = selectedNode();
      if (!node) return;
      const design = getDesignSize();
      const box = node.getClientRect({ relativeTo: layer });
      const dx = (design.width / 2) - (box.x + box.width / 2);
      const dy = (design.height / 2) - (box.y + box.height / 2);
      node.x(node.x() + dx);
      node.y(node.y() + dy);
      layer.draw();
      syncSelectedLayerControls();
      rebuildLayerList();
    });
    document.getElementById('resetLayerBtn').addEventListener('click', () => {
      const name = layerSelectEl.value;
      const node = selectedNode();
      const def = state.defaults[name];
      if (!node || !def) return;
      node.x(def.x); node.y(def.y); node.scaleX(def.scaleX); node.scaleY(def.scaleY); node.rotation(def.rotation);
      layer.draw();
      syncSelectedLayerControls();
      rebuildLayerList();
    });
    document.getElementById('alignLeftBtn').addEventListener('click', () => {
      const node = selectedNode();
      if (!node) return;
      const box = node.getClientRect({ relativeTo: layer });
      node.x(node.x() - box.x);
      layer.draw();
      syncSelectedLayerControls();
    });
    document.getElementById('alignCenterBtn').addEventListener('click', () => {
      const node = selectedNode();
      if (!node) return;
      const design = getDesignSize();
      const box = node.getClientRect({ relativeTo: layer });
      node.x(node.x() + (design.width / 2 - (box.x + box.width / 2)));
      layer.draw();
      syncSelectedLayerControls();
    });
    document.getElementById('alignRightBtn').addEventListener('click', () => {
      const node = selectedNode();
      if (!node) return;
      const design = getDesignSize();
      const box = node.getClientRect({ relativeTo: layer });
      node.x(node.x() + (design.width - (box.x + box.width)));
      layer.draw();
      syncSelectedLayerControls();
    });
    document.getElementById('alignTopBtn').addEventListener('click', () => {
      const node = selectedNode();
      if (!node) return;
      const box = node.getClientRect({ relativeTo: layer });
      node.y(node.y() - box.y);
      layer.draw();
      syncSelectedLayerControls();
    });
    document.getElementById('alignMiddleBtn').addEventListener('click', () => {
      const node = selectedNode();
      if (!node) return;
      const design = getDesignSize();
      const box = node.getClientRect({ relativeTo: layer });
      node.y(node.y() + (design.height / 2 - (box.y + box.height / 2)));
      layer.draw();
      syncSelectedLayerControls();
    });
    document.getElementById('alignBottomBtn').addEventListener('click', () => {
      const node = selectedNode();
      if (!node) return;
      const design = getDesignSize();
      const box = node.getClientRect({ relativeTo: layer });
      node.y(node.y() + (design.height - (box.y + box.height)));
      layer.draw();
      syncSelectedLayerControls();
    });

    [bgColorEl, bgGradientEndEl, bgGradientAngleEl, bgImageOpacityEl].forEach((el) => el.addEventListener('input', redrawKeepLayout));
    qrInputEl.addEventListener('change', redrawKeepLayout);
    barcodeInputEl.addEventListener('change', redrawKeepLayout);
    document.getElementById('toggleQrBtn').addEventListener('click', () => { state.visibility.qr = !state.visibility.qr; redrawKeepLayout(); });
    document.getElementById('toggleBarcodeBtn').addEventListener('click', () => { state.visibility.barcode = !state.visibility.barcode; redrawKeepLayout(); });

    showGuidesCheckEl.addEventListener('change', () => {
      state.guideSettings.show = !!showGuidesCheckEl.checked;
      drawGuides();
    });
    bleedPxEl.addEventListener('input', () => {
      state.guideSettings.bleed = Number(bleedPxEl.value || 12);
      drawGuides();
    });
    safePxEl.addEventListener('input', () => {
      state.guideSettings.safe = Number(safePxEl.value || 30);
      drawGuides();
    });
    snapCheckEl.addEventListener('change', () => {
      state.guideSettings.snap = !!snapCheckEl.checked;
    });

    document.getElementById('saveDesignBtn').addEventListener('click', saveDesignLocal);
    document.getElementById('loadDesignBtn').addEventListener('click', loadDesignLocal);
    document.getElementById('exportPngBtn').addEventListener('click', () => exportPng(4));

    wireFileLoader('uploadBackgroundBtn', bgInputEl, 'cardBg');
    wireFileLoader('uploadLogoBtn', logoInputEl, 'logo');
    wireFileLoader('uploadSignatureBtn', signInputEl, 'signature');

    document.getElementById('previewCsvBtn').addEventListener('click', async () => {
      if (!csvInputEl.files || !csvInputEl.files.length) {
        setBatchStatus('Choose CSV file first.', 'error');
        return;
      }
      const text = await csvInputEl.files[0].text();
      parsedCsvRows = parseCsvText(text);
      setBatchStatus(parsedCsvRows.length ? `${parsedCsvRows.length} row(s) parsed.` : 'No valid rows found.', parsedCsvRows.length ? 'info' : 'error');
    });
    document.getElementById('exportBatchBtn').addEventListener('click', exportBatchZip);

    document.getElementById('toggleLockBtn').addEventListener('click', () => {
      const name = layerSelectEl.value;
      const node = selectedNode();
      if (!name || !node) return;
      const meta = state.layerMeta[name] || { locked: false, hidden: false };
      meta.locked = !meta.locked;
      state.layerMeta[name] = meta;
      node.draggable(!meta.locked);
      rebuildLayerList();
    });
    document.getElementById('toggleHideBtn').addEventListener('click', () => {
      const name = layerSelectEl.value;
      const node = selectedNode();
      if (!name || !node) return;
      const meta = state.layerMeta[name] || { locked: false, hidden: false };
      meta.hidden = !meta.hidden;
      state.layerMeta[name] = meta;
      node.visible(!meta.hidden);
      layer.draw();
      rebuildLayerList();
    });
    document.getElementById('moveUpBtn').addEventListener('click', () => {
      const node = selectedNode();
      if (!node) return;
      node.moveUp();
      layer.draw();
      rebuildLayerSelect();
      layerSelectEl.value = node.name();
      rebuildLayerList();
    });
    document.getElementById('moveDownBtn').addEventListener('click', () => {
      const node = selectedNode();
      if (!node) return;
      node.moveDown();
      layer.draw();
      rebuildLayerSelect();
      layerSelectEl.value = node.name();
      rebuildLayerList();
    });
  }

  async function init() {
    populateEmployeeSelect();
    state.templateType = templateTypeEl.value;
    state.photoShape = photoShapeEl.value;
    state.guideSettings.show = !!showGuidesCheckEl.checked;
    state.guideSettings.bleed = Number(bleedPxEl.value || 12);
    state.guideSettings.safe = Number(safePxEl.value || 30);
    state.guideSettings.snap = !!snapCheckEl.checked;
    await drawCard();
    wireEvents();
    window.addEventListener('resize', fitStageToViewport);
    setStatus('Designer ready. Drag layers or use dropdown controls.');
  }

  init();
})();
</script>
</body>
</html>
