<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card Data Collection System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f8f3eb;
    --panel:#fffdf9;
    --red:#8b0000;
    --text:#2c1810;
    --muted:#74685d;
    --border:#e3d8cb;
    --shadow:0 20px 40px rgba(63, 24, 8, 0.08);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    font-family:'Source Sans 3',sans-serif;
    color:var(--text);
    background:linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
  }
  .shell {
    width:min(860px, 100%);
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:42px 34px;
    text-align:center;
  }
  .mark {
    width:62px;
    height:62px;
    margin:0 auto 18px;
    border-radius:20px;
    background:#fff;
    border:1px solid rgba(139,0,0,0.12);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .mark svg {
    width:32px;
    height:32px;
    stroke:var(--red);
  }
  h1 {
    font-family:'Playfair Display',serif;
    font-size:38px;
    line-height:1.08;
  }
  p {
    margin:14px auto 0;
    max-width:560px;
    color:var(--muted);
    font-size:16px;
    line-height:1.6;
  }
  .actions {
    margin-top:28px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
  }
  .actions a {
    text-decoration:none;
    border-radius:12px;
    padding:12px 18px;
    font-weight:700;
    font-size:14px;
  }
  .actions a.primary {
    background:var(--red);
    color:#fff;
  }
  .actions a.soft {
    background:#fff;
    color:var(--red);
    border:1px solid var(--border);
  }
  .footer {
    margin-top:24px;
    font-size:13px;
    color:var(--muted);
  }
  .footer a {
    color:var(--red);
    text-decoration:none;
    font-weight:700;
  }
  @media (max-width:640px) {
    .shell { padding:30px 22px; border-radius:22px; }
    h1 { font-size:30px; }
    p { font-size:15px; }
    .actions { flex-direction:column; }
    .actions a { width:100%; }
  }
</style>
</head>
<body>
  <main class="shell">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <path d="M12 3l7 4-7 4-7-4 7-4z"></path>
        <path d="M5 14l7 4 7-4"></path>
        <path d="M12 8v10"></path>
        <path d="M9 12h6"></path>
      </svg>
    </div>
    <h1>ID Card Data Collection System</h1>
    <p>Choose the page you want to work on.</p>
    <div class="actions">
      <a class="primary" href="/id-card">ID Card Page</a>
      <a class="soft" href="/certificate">Certificate Page</a>
      <a class="soft" href="/admin">Admin Panel</a>
      <a class="soft" href="/admin/backgrounds">Background Library</a>
    </div>
    <div class="footer">
      Developed by <a href="https://aipexlabs.in" target="_blank" rel="noopener noreferrer">Aipexlabs.in</a>
    </div>
  </main>
</body>
</html>
